<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
      }
      .animated-text {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Neon glowing white background -->
  <rect x="20" y="20" width="460" height="110" fill="#ffffff" rx="20" filter="url(#neon-glow)" />
  
  <!-- SENA in Blue, I in Orange -->
  <text x="250" y="105" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-style="italic" font-size="90" text-anchor="middle" class="animated-text">
    <tspan fill="#005099">SENA</tspan><tspan fill="#F26A21">I</tspan>
  </text>
</svg>
